<style>
  /* Hides Google's default UI elements */
  .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
  body { top: 0px !important; }
  .goog-tooltip { display: none !important; }
  .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
</style>

<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'mr',
      includedLanguages: 'en,mr',
      autoDisplay: false
    }, 'google_translate_element');
  }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<style>
  /* Completely hide the Google Translate Top Bar */
  iframe.goog-te-banner-frame {
    display: none !important;
  }
  
  /* Prevent the body from shifting down when the bar is hidden */
  body {
    top: 0px !important;
    position: static !important;
  }

  /* Hide the "Original Text" tooltip that appears on hover */
  .goog-tooltip, .goog-tooltip:hover {
    display: none !important;
  }
  .goog-text-highlight {
    background-color: transparent !important;
    border: none !important;
    box-shadow: none !important;
  }

  /* Hide the Google Translate branding gadget if it appears */
  #google_translate_element, .goog-te-gadget {
    display: none !important;
  }

  /* Prevent the "Powered by Google" text at the bottom of the page */
  .goog-logo-link {
    display: none !important;
  }
</style>
